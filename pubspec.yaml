name: color_twist
description: "A fast-paced, color-matching challenge where players navigate obstacles by switching colors."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'


dependencies:
  flutter:
    sdk: flutter



  cupertino_icons: ^1.0.9
  equatable: ^2.0.7
  flame: ^1.37.0
  flame_audio: ^2.12.1
  flutter_bloc: ^9.1.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:


  uses-material-design: true

  assets:
   - assets/images/
   - assets/audio/

  # To add custom fonts to your application, add a fonts section here,
